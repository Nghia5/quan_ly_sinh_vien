<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center text-primary mb-4">Đăng nhập</h3>
        
        <div th:if="${param.error}" class="alert alert-danger">Tài khoản hoặc mật khẩu không đúng!</div>
        <div th:if="${param.logout}" class="alert alert-info">Bạn đã đăng xuất.</div>
        <div th:if="${param.success}" class="alert alert-success">Đăng ký thành công! Hãy đăng nhập.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>
        <div class="text-center mt-3">
            <a th:href="@{/register}">Chưa có tài khoản? Đăng ký ngay</a><br>
            <a href="#">Quên mật khẩu?</a> <!-- Chức năng này sẽ làm ở phần sau -->
        </div>
    </div>
</body>
</html>
