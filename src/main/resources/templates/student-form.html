<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Sinh viên</title>
    <!-- Nhúng Bootstrap 5 và FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-user-plus"></i> Thông tin Sinh viên</h4>
                </div>
                <div class="card-body">
                    <!-- Form nhập liệu, gọi đến URL /students/save -->
                    <form th:action="@{/students/save}" th:object="${student}" method="post">
                        
                        <!-- Trường ẩn để lưu ID (Rất quan trọng cho chức năng Sửa) -->
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên sinh viên:</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập họ và tên..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tuổi:</label>
                            <input type="number" class="form-control" th:field="*{age}" placeholder="Nhập tuổi..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Ví dụ: email@domain.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Giới tính:</label>
                            <select class="form-select" th:field="*{gender}">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/students}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Quay lại</a>
                            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Lưu thông tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
